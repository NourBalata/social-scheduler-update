version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social_scheduler_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./storage:/var/www/storage
    networks:
      - app_network
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: social_scheduler_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: social_scheduler_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: social_scheduler
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: social_scheduler_user
      MYSQL_PASSWORD: social_scheduler_secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3309:3306"
    networks:
      - app_network

  redis:
    image: redis:alpine
    container_name: social_scheduler_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social_scheduler_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./:/var/www
    networks:
      - app_network
    depends_on:
      - db
      - redis

  # صلحنا الإزاحة (Indentation) وغيرنا اسم الكونتينر
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social_scheduler_cron
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "while [ true ]; do php artisan schedule:run; sleep 60; done"
    networks:
      - app_network
    depends_on:
      - app
      - redis

networks:
  app_network:
    driver: bridge

volumes:
  db_data: